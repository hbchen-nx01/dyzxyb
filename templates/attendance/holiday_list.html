{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <!-- 页面标题 -->
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">节假日管理</h1>
        <a href="{{ url_for('attendance.add_holiday') }}" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">
            <i class="fas fa-plus mr-2"></i> 添加节假日
        </a>
    </div>

    <!-- 考勤内部导航 -->
    {% include 'components/attendance_nav.html' %}
    
    <!-- 节假日列表 -->
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">节假日列表</h6>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>节假日名称</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for holiday in holidays %}
                        <tr>
                            <td>{{ holiday.holiday_date.strftime('%Y-%m-%d') }}</td>
                            <td>{{ holiday.name }}</td>
                            <td>
                                <a href="{{ url_for('attendance.holiday_duty_list', holiday_id=holiday.id) }}" class="btn btn-sm btn-info mr-2">
                                    <i class="fas fa-calendar-check mr-1"></i> 值班安排
                                </a>
                                <a href="{{ url_for('attendance.delete_holiday', holiday_id=holiday.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('确定要删除这个节假日吗？')">
                                    <i class="fas fa-trash mr-1"></i> 删除
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
