{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <!-- 页面标题 -->
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">考勤管理</h1>
    </div>

    <!-- 功能卡片 -->
    <div class="row">
        <!-- 日考勤管理 -->
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-primary shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
                                日考勤管理</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">
                                记录和管理每日考勤</div>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-calendar fa-2x text-gray-300"></i>
                        </div>
                    </div>
                    <div class="mt-3">
                        <a href="{{ url_for('attendance.daily_attendance') }}" class="btn btn-primary btn-sm">
                            <i class="fas fa-arrow-right mr-1"></i> 进入管理
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 请假申请 -->
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-success shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-success text-uppercase mb-1">
                                请假申请</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">
                                提交和审批请假</div>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-calendar-times fa-2x text-gray-300"></i>
                        </div>
                    </div>
                    <div class="mt-3">
                        <a href="{{ url_for('attendance.leave_application_list') }}" class="btn btn-success btn-sm">
                            <i class="fas fa-arrow-right mr-1"></i> 进入管理
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 加班申请 -->
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-info shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-info text-uppercase mb-1">
                                加班申请</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">
                                提交和审批加班</div>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-clock fa-2x text-gray-300"></i>
                        </div>
                    </div>
                    <div class="mt-3">
                        <a href="{{ url_for('attendance.overtime_application_list') }}" class="btn btn-info btn-sm">
                            <i class="fas fa-arrow-right mr-1"></i> 进入管理
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 节假日管理 -->
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-warning shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">
                                节假日管理</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">
                                管理节假日设置</div>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-star fa-2x text-gray-300"></i>
                        </div>
                    </div>
                    <div class="mt-3">
                        <a href="{{ url_for('attendance.holiday_list') }}" class="btn btn-warning btn-sm">
                            <i class="fas fa-arrow-right mr-1"></i> 进入管理
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 报表和统计 -->
    <div class="row">
        <!-- 考勤报表 -->
        <div class="col-xl-4 col-md-6 mb-4">
            <div class="card border-left-secondary shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-secondary text-uppercase mb-1">
                                考勤报表</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">
                                生成和导出考勤报表</div>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-file-excel fa-2x text-gray-300"></i>
                        </div>
                    </div>
                    <div class="mt-3">
                        <a href="{{ url_for('attendance.attendance_report') }}" class="btn btn-secondary btn-sm">
                            <i class="fas fa-arrow-right mr-1"></i> 进入管理
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 考勤统计 -->
        <div class="col-xl-4 col-md-6 mb-4">
            <div class="card border-left-indigo shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-indigo text-uppercase mb-1">
                                考勤统计</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">
                                统计和分析考勤数据</div>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-chart-bar fa-2x text-gray-300"></i>
                        </div>
                    </div>
                    <div class="mt-3">
                        <a href="{{ url_for('attendance.attendance_statistics') }}" class="btn btn-indigo btn-sm">
                            <i class="fas fa-arrow-right mr-1"></i> 进入管理
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 考勤异常 -->
        <div class="col-xl-4 col-md-6 mb-4">
            <div class="card border-left-danger shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-danger text-uppercase mb-1">
                                考勤异常</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">
                                查询和处理考勤异常</div>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-exclamation-triangle fa-2x text-gray-300"></i>
                        </div>
                    </div>
                    <div class="mt-3">
                        <a href="{{ url_for('attendance.attendance_exceptions') }}" class="btn btn-danger btn-sm">
                            <i class="fas fa-arrow-right mr-1"></i> 进入管理
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
