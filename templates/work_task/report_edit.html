{% extends 'base.html' %}

{% block title %}编辑工作日报{% endblock %}

{% block content %}
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h1 class="mb-4 text-center">编辑工作日报</h1>
            
            <div class="card">
                <div class="card-body">
                    <form action="{{ url_for('work_task.edit_work_report', id=report.id) }}" method="post">
                        <div class="mb-3">
                            <label for="task_title" class="form-label">关联任务</label>
                            <input type="text" class="form-control" id="task_title" value="{{ report.task.title }}" readonly>
                        </div>
                        
                        <div class="mb-3">
                            <label for="report_date" class="form-label">报告日期</label>
                            <input type="date" class="form-control" id="report_date" name="report_date" value="{{ report.report_date.strftime('%Y-%m-%d') }}">
                        </div>
                        
                        <div class="mb-3">
                            <label for="content" class="form-label">日报内容 *</label>
                            <textarea class="form-control" id="content" name="content" rows="10" required>{{ report.content }}</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="author" class="form-label">报告作者 *</label>
                            <input type="text" class="form-control" id="author" name="author" value="{{ report.author }}" required>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('work_task.work_task_detail', id=report.task_id) }}" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">保存修改</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
