{% extends 'base.html' %}

{% block title %}发布文章{% endblock %}

{% block content %}
    <div class="row">
        <div class="col-md-12">
            <h1 class="mb-4">发布内容</h1>
            
            <div class="card">
                <div class="card-body">
                    <form action="{{ url_for('experience.add_article') }}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="type" class="form-label">内容类型 *</label>
                            <select class="form-select" id="type" name="type" required>
                                <option value="article">长文章</option>
                                <option value="share">短分享</option>
                            </select>
                        </div>
                        
                        <div class="mb-3" id="title-field">
                            <label for="title" class="form-label">文章标题 *</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="category_id" class="form-label">分类 *</label>
                            <select class="form-select" id="category_id" name="category_id" required>
                                <option value="">请选择分类</option>
                                {% for category in categories %}
                                    <option value="{{ category.id }}">{{ category.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="author" class="form-label">作者 *</label>
                            <input type="text" class="form-control" id="author" name="author" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="content" class="form-label">内容 *</label>
                            <textarea class="form-control" id="content" name="content" rows="10" required></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="media" class="form-label">上传多媒体文件</label>
                            <input class="form-control" type="file" id="media" name="media" accept="image/*,video/*" multiple>
                            <div id="mediaHelp" class="form-text">支持上传图片和视频，可选择多个文件。</div>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('experience.experience_index') }}" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">发布</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 根据内容类型显示或隐藏标题字段
        document.getElementById('type').addEventListener('change', function() {
            const titleField = document.getElementById('title-field');
            const titleInput = document.getElementById('title');
            if (this.value === 'share') {
                titleField.style.display = 'none';
                titleInput.removeAttribute('required');
                titleInput.value = '';
            } else {
                titleField.style.display = 'block';
                titleInput.setAttribute('required', 'required');
            }
        });
    </script>
    
    <!-- 引入CKEditor -->
    <script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>
    <script>
        // 初始化CKEditor
        CKEDITOR.replace('content');
    </script>
{% endblock %}
