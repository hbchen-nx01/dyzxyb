{% extends 'base.html' %}

{% block title %}添加技能等级{% endblock %}

{% block content %}
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h1 class="mb-4">添加技能等级 - {{ employee.name }}</h1>
            
            <div class="card">
                <div class="card-body">
                    <form method="post" action="{{ url_for('employee.add_skill_level', employee_id=employee.id) }}">
                        <div class="mb-3">
                            <label for="skill_name" class="form-label">技能名称 *</label>
                            <input type="text" class="form-control" id="skill_name" name="skill_name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="level" class="form-label">技能等级 *</label>
                            <input type="text" class="form-control" id="level" name="level" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="obtained_date" class="form-label">获得日期 *</label>
                            <input type="date" class="form-control" id="obtained_date" name="obtained_date" required>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('employee.employee_detail', id=employee.id) }}" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
