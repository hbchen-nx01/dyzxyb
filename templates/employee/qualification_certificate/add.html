{% extends 'base.html' %}

{% block title %}添加资质证书{% endblock %}

{% block content %}
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h1 class="mb-4">添加资质证书 - {{ employee.name }}</h1>
            
            <div class="card">
                <div class="card-body">
                    <form method="post" action="{{ url_for('employee.add_qualification_certificate', employee_id=employee.id) }}" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="certificate_name" class="form-label">证书名称 *</label>
                            <input type="text" class="form-control" id="certificate_name" name="certificate_name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="certificate_number" class="form-label">证书编号 *</label>
                            <input type="text" class="form-control" id="certificate_number" name="certificate_number" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="issued_by" class="form-label">发证机构 *</label>
                            <input type="text" class="form-control" id="issued_by" name="issued_by" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="issued_date" class="form-label">发证日期 *</label>
                            <input type="date" class="form-control" id="issued_date" name="issued_date" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="valid_until" class="form-label">有效期至</label>
                            <input type="date" class="form-control" id="valid_until" name="valid_until">
                            <div id="validUntilHelp" class="form-text">留空表示长期有效</div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="certificate_file" class="form-label">证书文件</label>
                            <input type="file" class="form-control" id="certificate_file" name="certificate_file" accept=".pdf,.doc,.docx,.png,.jpg">
                            <div id="certificateFileHelp" class="form-text">支持PDF、Word、图片格式，最大16MB</div>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('employee.employee_detail', id=employee.id) }}" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
