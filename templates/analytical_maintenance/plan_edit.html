{% extends 'base.html' %}

{% block title %}编辑维护计划{% endblock %}

{% block content %}
    <div class="row">
        <div class="col-md-12">
            <h1 class="mb-4">编辑维护计划</h1>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-12">
            <div class="card shadow mb-4">
                <div class="card-body">
                    <form method="POST" action="">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="equipment_id" class="form-label">设备名称</label>
                                <select class="form-select" id="equipment_id" name="equipment_id" required>
                                    <option value="">请选择设备</option>
                                    {% for equipment in equipments %}
                                        <option value="{{ equipment.id }}" {% if equipment.id == plan.equipment_id %}selected{% endif %}>{{ equipment.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="plan_name" class="form-label">计划名称</label>
                                <input type="text" class="form-control" id="plan_name" name="plan_name" value="{{ plan.plan_name }}" required>
                            </div>
                            <div class="col-md-12">
                                <label for="description" class="form-label">计划描述</label>
                                <textarea class="form-control" id="description" name="description" rows="3">{{ plan.description }}</textarea>
                            </div>
                            <div class="col-md-6">
                                <label for="maintenance_type" class="form-label">维护类型</label>
                                <select class="form-select" id="maintenance_type" name="maintenance_type" required>
                                    <option value="">请选择维护类型</option>
                                    <option value="日常维护" {% if plan.maintenance_type == '日常维护' %}selected{% endif %}>日常维护（每日）</option>
                                    <option value="周维护" {% if plan.maintenance_type == '周维护' %}selected{% endif %}>周维护（每周）</option>
                                    <option value="月维护" {% if plan.maintenance_type == '月维护' %}selected{% endif %}>月维护（每月）</option>
                                    <option value="季度维护" {% if plan.maintenance_type == '季度维护' %}selected{% endif %}>季度维护（每季度）</option>
                                    <option value="年度维护" {% if plan.maintenance_type == '年度维护' %}selected{% endif %}>年度维护（每年）</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="frequency" class="form-label">维护频率</label>
                                <select class="form-select" id="frequency" name="frequency" required>
                                    <option value="">请选择维护频率</option>
                                    <option value="daily" {% if plan.frequency == 'daily' %}selected{% endif %}>每日</option>
                                    <option value="weekly" {% if plan.frequency == 'weekly' %}selected{% endif %}>每周</option>
                                    <option value="monthly" {% if plan.frequency == 'monthly' %}selected{% endif %}>每月</option>
                                    <option value="quarterly" {% if plan.frequency == 'quarterly' %}selected{% endif %}>每季度</option>
                                    <option value="yearly" {% if plan.frequency == 'yearly' %}selected{% endif %}>每年</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="next_maintenance_date" class="form-label">下次维护日期</label>
                                <input type="date" class="form-control" id="next_maintenance_date" name="next_maintenance_date" value="{{ plan.next_maintenance_date.strftime('%Y-%m-%d') }}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="created_by" class="form-label">创建人</label>
                                <input type="text" class="form-control" id="created_by" name="created_by" value="{{ plan.created_by }}" required>
                            </div>
                            <div class="col-md-12 d-flex justify-content-end">
                                <button type="submit" class="btn btn-primary me-2">保存修改</button>
                                <a href="{{ url_for('analytical_maintenance.plan_index') }}" class="btn btn-secondary">取消</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
