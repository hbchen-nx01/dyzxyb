{% extends 'base.html' %}

{% block title %}添加培训计划{% endblock %}

{% block content %}
    <div class="row">
        <div class="col-md-12">
            <h1 class="mb-4">添加培训计划</h1>
            
            <!-- 添加培训计划表单 -->
            <div class="card">
                <div class="card-body">
                    <form method="post" action="{{ url_for('training.add_training_plan') }}">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label for="title" class="form-label">培训主题 <span class="text-danger">*</span></label>
                                <input type="text" name="title" id="title" class="form-control" required placeholder="请输入培训主题">
                            </div>
                            
                            <div class="col-md-12">
                                <label for="description" class="form-label">培训描述</label>
                                <textarea name="description" id="description" class="form-control" rows="3" placeholder="请输入培训描述"></textarea>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="trainer" class="form-label">讲师 <span class="text-danger">*</span></label>
                                <input type="text" name="trainer" id="trainer" class="form-control" required placeholder="请输入讲师姓名">
                            </div>
                            
                            <div class="col-md-3">
                                <label for="location" class="form-label">培训地点 <span class="text-danger">*</span></label>
                                <input type="text" name="location" id="location" class="form-control" required placeholder="请输入培训地点">
                            </div>
                            
                            <div class="col-md-3">
                                <label for="created_by" class="form-label">创建人 <span class="text-danger">*</span></label>
                                <input type="text" name="created_by" id="created_by" class="form-control" required placeholder="请输入创建人姓名">
                            </div>
                            
                            <div class="col-md-3">
                                <label for="start_date" class="form-label">开始日期 <span class="text-danger">*</span></label>
                                <input type="date" name="start_date" id="start_date" class="form-control" required>
                            </div>
                            
                            <div class="col-md-3">
                                <label for="start_time" class="form-label">开始时间 <span class="text-danger">*</span></label>
                                <input type="time" name="start_time" id="start_time" class="form-control" required>
                            </div>
                            
                            <div class="col-md-3">
                                <label for="end_date" class="form-label">结束日期 <span class="text-danger">*</span></label>
                                <input type="date" name="end_date" id="end_date" class="form-control" required>
                            </div>
                            
                            <div class="col-md-3">
                                <label for="end_time" class="form-label">结束时间 <span class="text-danger">*</span></label>
                                <input type="time" name="end_time" id="end_time" class="form-control" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="status" class="form-label">状态 <span class="text-danger">*</span></label>
                                <select name="status" id="status" class="form-select" required>
                                    <option value="planned">计划中</option>
                                    <option value="in_progress">进行中</option>
                                    <option value="completed">已完成</option>
                                    <option value="cancelled">已取消</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mt-4 d-flex justify-content-end">
                            <a href="{{ url_for('training.training_plan_index') }}" class="btn btn-secondary me-2">取消</a>
                            <button type="submit" class="btn btn-primary">保存培训计划</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
