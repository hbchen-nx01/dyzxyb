[build]
  command = "pip install -r requirements.txt && pip install -r functions/requirements.txt"
  functions = "functions"
  publish = "static"

[build.environment]
  PYTHON_VERSION = "3.10"

[functions]
  included_files = ["static/**/*", "templates/**/*", "instance/**/*"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200